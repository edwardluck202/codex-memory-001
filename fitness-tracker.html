<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健身记录</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --line-strong: rgba(0, 0, 0, 0.12);
      --panel: rgba(255, 255, 255, 0.82);
      --soft: rgba(0, 0, 0, 0.045);
      --blue: #007aff;
      --teal: #00a6a6;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --purple: #5856d6;
      --shadow: 0 22px 58px rgba(31, 35, 42, 0.1);
      --shadow-soft: 0 12px 30px rgba(31, 35, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, #f7f8fb 0%, #ecf1f4 46%, #e7ebf2 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1160px, calc(100vw - 36px));
      margin: 30px auto 36px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      padding: 4px 2px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(145deg, #0a84ff, #00a6a6 56%, #34c759);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38), 0 15px 30px rgba(0, 122, 255, 0.18);
      color: #fff;
    }

    .icon svg {
      width: 26px;
      height: 26px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 550;
    }

    .today {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 380px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
    }

    .form-card {
      padding: 20px;
      position: sticky;
      top: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .save-note {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0 2px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.03);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .save-note span:last-child {
      color: var(--teal);
      white-space: nowrap;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: 0;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      padding: 0 13px;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    input:focus,
    select:focus {
      border-color: rgba(0, 122, 255, 0.55);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .submit {
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 14px;
      margin-top: 6px;
      background: linear-gradient(135deg, #1d1d1f, #2f343b);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(29, 29, 31, 0.19);
      transition: transform 150ms ease, opacity 150ms ease, box-shadow 150ms ease;
    }

    .submit:hover {
      box-shadow: 0 18px 38px rgba(29, 29, 31, 0.24);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(0, 122, 255, 0.18);
      outline-offset: 2px;
    }

    button:active {
      transform: scale(0.98);
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
    }

    .metric {
      position: relative;
      overflow: hidden;
      min-height: 112px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: var(--shadow-soft);
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--blue);
    }

    .metric:nth-child(2)::before {
      background: var(--teal);
    }

    .metric:nth-child(3)::before {
      background: var(--orange);
    }

    .metric:nth-child(4)::before {
      background: var(--purple);
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric strong {
      display: block;
      margin-top: 9px;
      font-size: 26px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .metric em {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      font-style: normal;
      font-weight: 700;
    }

    .metric.parts strong {
      font-size: 20px;
      line-height: 1.25;
      white-space: normal;
      word-break: keep-all;
    }

    .history {
      padding: 18px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .toolbar > div:first-child {
      min-width: 150px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: 288px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.04);
    }

    .tab {
      height: 34px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab.active {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      box-shadow: 0 7px 16px rgba(0, 0, 0, 0.08);
    }

    .clear {
      height: 36px;
      border: 1px solid rgba(255, 59, 48, 0.2);
      border-radius: 999px;
      background: rgba(255, 59, 48, 0.075);
      color: var(--red);
      padding: 0 13px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .clear:hover {
      border-color: rgba(255, 59, 48, 0.34);
      background: rgba(255, 59, 48, 0.12);
    }

    .calendar {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.48);
    }

    .calendar-title {
      font-size: 15px;
      font-weight: 850;
    }

    .calendar-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .calendar-grid {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .calendar-grid.day,
    .calendar-grid.week {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-grid.month {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-grid.year {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .weekday {
      color: var(--muted);
      text-align: center;
      font-size: 11px;
      font-weight: 850;
    }

    .calendar-cell {
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.58);
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .calendar-cell.muted {
      opacity: 0.42;
    }

    .calendar-cell.future {
      border-color: rgba(0, 0, 0, 0.055);
      background: rgba(255, 255, 255, 0.32);
      color: rgba(29, 29, 31, 0.34);
      opacity: 0.62;
    }

    .calendar-cell.future .cell-body,
    .calendar-cell.future .cell-date {
      color: rgba(110, 110, 115, 0.6);
    }

    .calendar-cell.future .cell-dot {
      display: none;
    }

    .calendar-cell.has-data {
      border-color: rgba(0, 122, 255, 0.25);
      background: linear-gradient(180deg, rgba(0, 122, 255, 0.13), rgba(255, 255, 255, 0.68));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .calendar-cell.has-data:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 122, 255, 0.38);
    }

    .cell-date {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 850;
    }

    .cell-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--blue);
      opacity: 0;
    }

    .has-data .cell-dot {
      opacity: 1;
    }

    .cell-body {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }

    .groups {
      display: grid;
      gap: 12px;
    }

    .group {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.58);
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.5);
    }

    .group-title {
      font-weight: 850;
    }

    .group-total {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .entry {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.055);
      transition: background 150ms ease;
    }

    .entry:hover {
      background: rgba(0, 0, 0, 0.025);
    }

    .entry:last-child {
      border-bottom: 0;
    }

    .entry-main {
      min-width: 0;
    }

    .entry-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 5px;
    }

    .part {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 166, 166, 0.11);
      color: #087f7f;
      font-size: 12px;
      font-weight: 850;
    }

    .exercise {
      font-size: 15px;
      font-weight: 850;
    }

    .detail {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .volume {
      text-align: right;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .delete {
      margin-top: 5px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: color 150ms ease;
    }

    .delete:hover {
      color: var(--red);
    }

    .empty {
      padding: 46px 20px;
      text-align: center;
      color: var(--muted);
      font-weight: 650;
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.42);
    }

    .empty strong {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
    }

    .empty span {
      display: block;
      font-size: 13px;
    }

    @media (max-width: 880px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .form-card {
        position: static;
      }

      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
      }

      .tabs {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100vw - 20px, 430px);
        margin: 18px auto 28px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 25px;
      }

      .sub {
        font-size: 13px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .clear {
        justify-self: start;
      }

      .calendar-grid.day,
      .calendar-grid.week,
      .calendar-grid.month {
        gap: 6px;
      }

      .calendar-grid.month {
        min-width: 560px;
      }

      .calendar-grid.year {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .calendar-cell {
        min-height: 72px;
        padding: 9px;
      }

      .summary,
      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .entry {
        grid-template-columns: 1fr;
      }

      .volume {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 13h14M3.5 10.5v5M20.5 10.5v5M8 9v8M16 9v8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>健身记录</h1>
          <div class="sub">记录部位、动作、次数、重量，并按周月年回看</div>
        </div>
      </div>
      <div class="today" id="today"></div>
    </header>

    <div class="layout">
      <section class="panel form-card">
        <div class="panel-title">
          <h2>新增训练</h2>
          <div class="hint">本地自动保存</div>
        </div>

        <form id="workoutForm">
          <div class="field">
            <label for="date">日期</label>
            <input id="date" type="date" required>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="part">健身部位</label>
              <select id="part" required>
                <option value="胸">胸</option>
                <option value="背">背</option>
                <option value="肩">肩</option>
                <option value="腿">腿</option>
                <option value="手臂">手臂</option>
                <option value="核心">核心</option>
                <option value="有氧">有氧</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div class="field">
              <label for="exercise">动作</label>
              <input id="exercise" list="exerciseList" required>
              <datalist id="exerciseList">
                <option value="杠铃卧推"></option>
                <option value="哑铃卧推"></option>
                <option value="深蹲"></option>
                <option value="硬拉"></option>
                <option value="引体向上"></option>
                <option value="坐姿划船"></option>
                <option value="肩推"></option>
                <option value="二头弯举"></option>
              </datalist>
            </div>
          </div>

          <div class="grid-3">
            <div class="field">
              <label for="sets">组数</label>
              <input id="sets" type="number" min="1" step="1" value="4" required>
            </div>
            <div class="field">
              <label for="reps">每组次数</label>
              <input id="reps" type="number" min="1" step="1" value="10" required>
            </div>
            <div class="field">
              <label for="weight">重量 kg</label>
              <input id="weight" type="number" min="0" step="0.5" value="20" required>
            </div>
          </div>

          <button class="submit" type="submit">保存记录</button>
          <div class="save-note" aria-live="polite">
            <span>数据仅保存在当前浏览器</span>
            <span id="saveStatus">待记录</span>
          </div>
        </form>
      </section>

      <div class="content">
        <section class="summary">
          <div class="metric">
            <small>训练次数</small>
            <strong id="metricSessions">0</strong>
            <em>今日记录条数</em>
          </div>
          <div class="metric">
            <small>当日组数</small>
            <strong id="metricExercises">0</strong>
            <em>今日所有组数合计</em>
          </div>
          <div class="metric">
            <small>当日训练次数</small>
            <strong id="metricVolume">0</strong>
            <em>组数 × 次数</em>
          </div>
          <div class="metric parts">
            <small>当日训练部位</small>
            <strong id="metricMax">0</strong>
            <em>今日涉及的健身部位</em>
          </div>
        </section>

        <section class="panel history">
          <div class="toolbar">
            <div>
              <h2>历史查看</h2>
              <div class="hint" id="rangeLabel">按日历日查看</div>
            </div>
            <div class="tabs" role="tablist" aria-label="历史范围">
              <button class="tab active" data-range="day" type="button">日</button>
              <button class="tab" data-range="week" type="button">周</button>
              <button class="tab" data-range="month" type="button">月</button>
              <button class="tab" data-range="year" type="button">年</button>
            </div>
          </div>

          <div class="calendar" id="calendar"></div>
          <div class="groups" id="groups"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const storeKey = "appleFitnessRecords";
    const form = document.getElementById("workoutForm");
    const calendarEl = document.getElementById("calendar");
    const groupsEl = document.getElementById("groups");
    const dateEl = document.getElementById("date");
    const partEl = document.getElementById("part");
    const exerciseList = document.getElementById("exerciseList");
    const tabs = document.querySelectorAll(".tab");
    const rangeLabel = document.getElementById("rangeLabel");
    const saveStatus = document.getElementById("saveStatus");
    const submitButton = form.querySelector(".submit");
    const today = new Date();
    const todayKey = toISODate(today);
    const exerciseOptions = {
      "胸": ["杠铃卧推", "哑铃卧推", "上斜卧推", "下斜卧推", "器械推胸", "哑铃飞鸟", "绳索夹胸", "蝴蝶机夹胸", "俯卧撑", "双杠臂屈伸"],
      "背": ["引体向上", "高位下拉", "坐姿划船", "杠铃划船", "哑铃划船", "T 杠划船", "器械划船", "直臂下压", "硬拉", "山羊挺身"],
      "肩": ["杠铃推举", "哑铃肩推", "器械肩推", "阿诺德推举", "哑铃侧平举", "绳索侧平举", "前平举", "俯身飞鸟", "反向蝴蝶机", "面拉", "杠铃耸肩"],
      "腿": ["杠铃深蹲", "史密斯深蹲", "前蹲", "腿举", "箭步蹲", "保加利亚分腿蹲", "腿屈伸", "腿弯举", "罗马尼亚硬拉", "臀推", "臀桥", "髋外展", "髋内收", "站姿提踵", "坐姿提踵"],
      "手臂": ["杠铃弯举", "哑铃弯举", "锤式弯举", "牧师凳弯举", "绳索弯举", "集中弯举", "窄距卧推", "绳索下压", "直杆下压", "过顶臂屈伸", "仰卧臂屈伸", "哑铃颈后臂屈伸"],
      "核心": ["卷腹", "仰卧举腿", "悬垂举腿", "平板支撑", "侧平板支撑", "俄罗斯转体", "绳索卷腹", "腹轮", "死虫", "鸟狗", "登山跑"],
      "有氧": ["跑步机", "椭圆机", "动感单车", "划船机", "登山机", "楼梯机", "风阻单车", "跳绳"]
    };

    let records = JSON.parse(localStorage.getItem(storeKey) || "[]");
    let range = "day";

    document.getElementById("today").textContent = new Intl.DateTimeFormat("zh-CN", {
      month: "long",
      day: "numeric",
      weekday: "long"
    }).format(today);

    dateEl.max = todayKey;
    dateEl.value = todayKey;
    dateEl.setAttribute("aria-describedby", "saveStatus");
    renderExerciseOptions();

    function toISODate(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 10);
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(records));
    }

    function dateFromISO(dateString) {
      return new Date(`${dateString}T00:00:00`);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function sameMonth(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
    }

    function weekKey(dateString) {
      const date = dateFromISO(dateString);
      const day = date.getDay() || 7;
      date.setDate(date.getDate() + 4 - day);
      const yearStart = new Date(date.getFullYear(), 0, 1);
      const week = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      return `${date.getFullYear()} 第 ${String(week).padStart(2, "0")} 周`;
    }

    function monthKey(dateString) {
      const date = dateFromISO(dateString);
      return `${date.getFullYear()} 年 ${date.getMonth() + 1} 月`;
    }

    function yearKey(dateString) {
      return `${dateFromISO(dateString).getFullYear()} 年`;
    }

    function groupKey(record) {
      if (range === "day") return record.date;
      if (range === "year") return yearKey(record.date);
      if (range === "month") return monthKey(record.date);
      return weekKey(record.date);
    }

    function volume(record) {
      return Number(record.sets) * Number(record.reps) * Number(record.weight);
    }

    function totalSets(items) {
      return items.reduce((sum, item) => sum + Number(item.sets), 0);
    }

    function totalReps(record) {
      return Number(record.sets) * Number(record.reps);
    }

    function recordsForISODate(dateString) {
      return records.filter(record => record.date === dateString);
    }

    function renderExerciseOptions() {
      const options = exerciseOptions[partEl.value] || [];
      exerciseList.innerHTML = options.map(option => `<option value="${escapeHTML(option)}"></option>`).join("");
    }

    function isFutureISODate(dateString) {
      return dateString > todayKey;
    }

    function clampDateToToday() {
      if (!dateEl.value || !isFutureISODate(dateEl.value)) return false;
      dateEl.value = todayKey;
      saveStatus.textContent = "日期不能晚于今天";
      return true;
    }

    function renderMetrics() {
      const todayRecords = recordsForISODate(todayKey);
      const totalDailyReps = todayRecords.reduce((sum, record) => sum + totalReps(record), 0);
      const parts = [...new Set(todayRecords.map(record => record.part))];

      document.getElementById("metricSessions").textContent = todayRecords.length;
      document.getElementById("metricExercises").textContent = totalSets(todayRecords);
      document.getElementById("metricVolume").textContent = totalDailyReps.toLocaleString("zh-CN");
      document.getElementById("metricMax").textContent = parts.length ? parts.join("、") : "0";
    }

    function summarize(items) {
      return {
        count: items.length,
        sets: totalSets(items),
        volume: items.reduce((sum, item) => sum + volume(item), 0),
        parts: [...new Set(items.map(item => item.part))]
      };
    }

    function recordsForDate(date) {
      const iso = toISODate(date);
      return records.filter(record => record.date === iso);
    }

    function calendarCell(label, items, options = {}) {
      const info = summarize(items);
      const muted = options.muted ? " muted" : "";
      const future = options.future ? " future" : "";
      const hasData = info.count && !options.future ? " has-data" : "";
      return `
        <div class="calendar-cell${muted}${future}${hasData}" aria-disabled="${options.future ? "true" : "false"}">
          <div class="cell-date">
            <span>${label}</span>
            <span class="cell-dot"></span>
          </div>
          <div class="cell-body">
            ${options.future ? "未开始" : info.count ? `${info.count} 动作<br>${info.sets.toLocaleString("zh-CN")} 组` : "无训练"}
          </div>
        </div>
      `;
    }

    function renderCalendar() {
      const base = records.length
        ? dateFromISO([...records].sort((a, b) => b.date.localeCompare(a.date))[0].date)
        : today;
      const weekdays = ["一", "二", "三", "四", "五", "六", "日"];
      const total = summarize(records);

      if (range === "day") {
        const start = addDays(base, -3);
        const cells = Array.from({ length: 7 }, (_, index) => {
          const date = addDays(start, index);
          const label = `${date.getMonth() + 1}/${date.getDate()}`;
          const dateKey = toISODate(date);
          return calendarCell(label, recordsForDate(date), {
            muted: dateKey !== toISODate(base),
            future: isFutureISODate(dateKey)
          });
        }).join("");
        calendarEl.innerHTML = `
          <div class="calendar-head">
            <div class="calendar-title">${toISODate(base)}</div>
            <div class="calendar-meta">${total.count} 个动作 · ${total.sets.toLocaleString("zh-CN")} 组</div>
          </div>
          <div class="calendar-grid day">${cells}</div>
        `;
        return;
      }

      if (range === "week") {
        const monday = addDays(base, -((base.getDay() || 7) - 1));
        const cells = Array.from({ length: 7 }, (_, index) => {
          const date = addDays(monday, index);
          return calendarCell(`${weekdays[index]} ${date.getDate()}`, recordsForDate(date), {
            future: isFutureISODate(toISODate(date))
          });
        }).join("");
        const sunday = addDays(monday, 6);
        const weekItems = records.filter(record => {
          const date = dateFromISO(record.date);
          return date >= monday && date <= sunday;
        });
        const weekSummary = summarize(weekItems);
        calendarEl.innerHTML = `
          <div class="calendar-head">
            <div class="calendar-title">${weekKey(toISODate(base))}</div>
            <div class="calendar-meta">${weekSummary.count} 个动作 · ${weekSummary.sets.toLocaleString("zh-CN")} 组</div>
          </div>
          <div class="calendar-grid week">${cells}</div>
        `;
        return;
      }

      if (range === "month") {
        const first = new Date(base.getFullYear(), base.getMonth(), 1);
        const startOffset = (first.getDay() || 7) - 1;
        const start = addDays(first, -startOffset);
        const weekdayLabels = weekdays.map(day => `<div class="weekday">${day}</div>`).join("");
        const dayCells = Array.from({ length: 42 }, (_, index) => {
          const date = addDays(start, index);
          return calendarCell(String(date.getDate()), recordsForDate(date), {
            muted: !sameMonth(date, base),
            future: isFutureISODate(toISODate(date))
          });
        }).join("");
        const monthItems = records.filter(record => {
          const date = dateFromISO(record.date);
          return date.getFullYear() === base.getFullYear() && date.getMonth() === base.getMonth();
        });
        const monthSummary = summarize(monthItems);
        calendarEl.innerHTML = `
          <div class="calendar-head">
            <div class="calendar-title">${monthKey(toISODate(base))}</div>
            <div class="calendar-meta">${monthSummary.count} 个动作 · ${monthSummary.sets.toLocaleString("zh-CN")} 组</div>
          </div>
          <div class="calendar-grid month">${weekdayLabels}${dayCells}</div>
        `;
        return;
      }

      const yearItems = records.filter(record => dateFromISO(record.date).getFullYear() === base.getFullYear());
      const yearSummary = summarize(yearItems);
      const months = Array.from({ length: 12 }, (_, index) => {
        const items = records.filter(record => {
          const date = dateFromISO(record.date);
          return date.getFullYear() === base.getFullYear() && date.getMonth() === index;
        });
        const monthStart = toISODate(new Date(base.getFullYear(), index, 1));
        return calendarCell(`${index + 1} 月`, items, { future: monthStart > todayKey });
      }).join("");
      calendarEl.innerHTML = `
        <div class="calendar-head">
          <div class="calendar-title">${base.getFullYear()} 年</div>
          <div class="calendar-meta">${yearSummary.count} 个动作 · ${yearSummary.sets.toLocaleString("zh-CN")} 组</div>
        </div>
        <div class="calendar-grid year">${months}</div>
      `;
    }

    function renderHistory() {
      rangeLabel.textContent = range === "day" ? "按日历日查看" : range === "week" ? "按周日历查看" : range === "month" ? "按月日历查看" : "按年日历查看";
      groupsEl.innerHTML = "";

      if (records.length === 0) {
        calendarEl.innerHTML = "";
        groupsEl.innerHTML = '<div class="empty"><strong>还没有训练记录</strong><span>填写左侧表单后，历史和统计会自动更新。</span></div>';
        renderMetrics();
        return;
      }

      renderCalendar();

      const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
      const grouped = new Map();
      for (const record of sorted) {
        const key = groupKey(record);
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(record);
      }

      for (const [key, items] of grouped) {
        const group = document.createElement("article");
        group.className = "group";
        const summary = summarize(items);
        group.innerHTML = `
          <div class="group-head">
            <div class="group-title">${key}</div>
            <div class="group-total">${summary.count} 个动作 · ${summary.sets.toLocaleString("zh-CN")} 组</div>
          </div>
        `;

        for (const item of items) {
          const row = document.createElement("div");
          row.className = "entry";
          row.innerHTML = `
            <div class="entry-main">
              <div class="entry-top">
                <span class="part">${item.part}</span>
                <span class="exercise">${escapeHTML(item.exercise)}</span>
              </div>
              <div class="detail">${item.date} · ${item.sets} 组 × ${item.reps} 次 × ${item.weight} kg</div>
            </div>
            <div>
              <div class="volume">${totalSets(recordsForISODate(item.date)).toLocaleString("zh-CN")} 组</div>
              <button class="delete" data-id="${item.id}" type="button">删除</button>
            </div>
          `;
          group.appendChild(row);
        }

        groupsEl.appendChild(group);
      }

      renderMetrics();
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      if (clampDateToToday()) {
        dateEl.focus();
        return;
      }
      const record = {
        id: crypto.randomUUID(),
        date: dateEl.value,
        part: document.getElementById("part").value,
        exercise: document.getElementById("exercise").value.trim(),
        sets: Number(document.getElementById("sets").value),
        reps: Number(document.getElementById("reps").value),
        weight: Number(document.getElementById("weight").value),
        createdAt: Date.now()
      };
      records.push(record);
      save();
      form.reset();
      renderExerciseOptions();
      dateEl.value = record.date;
      document.getElementById("sets").value = 4;
      document.getElementById("reps").value = 10;
      document.getElementById("weight").value = record.weight;
      saveStatus.textContent = "已保存";
      submitButton.textContent = "保存成功";
      window.setTimeout(() => {
        saveStatus.textContent = "待记录";
        submitButton.textContent = "保存记录";
      }, 1200);
      renderHistory();
    });

    dateEl.addEventListener("change", () => {
      clampDateToToday();
    });

    dateEl.addEventListener("input", clampDateToToday);
    dateEl.addEventListener("blur", clampDateToToday);

    partEl.addEventListener("change", renderExerciseOptions);

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        range = tab.dataset.range;
        tabs.forEach(item => item.classList.toggle("active", item === tab));
        renderHistory();
      });
    });

    groupsEl.addEventListener("click", event => {
      if (!event.target.matches(".delete")) return;
      records = records.filter(record => record.id !== event.target.dataset.id);
      save();
      renderHistory();
    });

    renderHistory();
  </script>
</body>
</html>
